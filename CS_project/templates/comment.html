<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit a Comment</title>
</head>
<body>

<div style="width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc;">
    <h2>Submit a Comment</h2>
    <form action="{% url 'comment' %}" method="post">
        {% csrf_token %}
        <div style="margin-bottom: 20px;">
            <label for="comment">Comment:</label>
            <textarea name="comment" rows="5" cols="40" required></textarea>
        </div>
        <input type="submit" value="Submit Comment">
    </form>

    <hr style="margin-top: 30px;">
    <h3>Recent Comments (UNSAFE - no escaping):</h3>
    {% if comments %}
    <ul style="border-left: 3px solid red; padding-left: 15px; margin-top: 10px;">
        {% for item in comments %}
        <li style="margin-bottom: 10px; background-color: #ffe0e0; padding: 8px;">
            {{ item.comment|safe }}
        </li>
        {% endfor %}
    </ul>
    {% else %}
    <p>No comments yet.</p>
    {% endif %}
</div>

</body>
</html>
