<!DOCTYPE html>
<html>
<head>
    <title>Search Results</title>
</head>
<body>
    <h2>Search results for "{{ query }}"</h2>

    {% if users %}
    <ul>
        {% for user in users %}
        <li><a href="{% url 'view_profile' user.id %}">{{ user.username }}</a></li>
        {% endfor %}
    </ul>
    {% else %}
    <p>No users found.</p>
    {% endif %}

    <p><a href="{% url 'search_user' %}">New search</a></p>
    <p><a href="{% url 'show_users' %}">Back to users</a></p>
</body>
</html>
